<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Pro - Panel de Agentes</title>
    <link rel="stylesheet" href="estilos_nuevos/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { visibility: hidden; opacity: 0; transition: opacity 0.5s; background-color: #0f172a; }
        
        .grid-agentes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .tarjeta-agente {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
        }
        .tarjeta-agente:hover { transform: translateY(-5px); }
        .foto-agente {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #f1f5f9;
        }
        .indicador-estado {
            width: 12px; height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .estado-disponible { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .estado-servicio { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .estado-descanso { background: #94a3b8; box-shadow: 0 0 8px #94a3b8; }
        
        .btn-contratar {
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-contratar:hover { background: #1e293b; }
        .btn-contratar:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        /* ESTILOS DEL MODAL PROFESIONAL */
        .modal-protecbol {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 2000;
        }
        .modal-contenido {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px;
            position: relative; animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .cerrar-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #64748b; }
        .cuadro-precio {
            background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 20px 0;
            display: flex; justify-content: space-between; align-items: center; border: 1px dashed #cbd5e1;
        }
        .cuadro-precio strong { color: #0f172a; font-size: 1.3rem; }
        
        #formContrato label { display: block; margin-top: 15px; font-size: 0.85rem; font-weight: bold; color: #475569; text-align: left;}
        #formContrato input, #formContrato select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box;}
    </style>
</head>
<body id="cuerpo-pagina">
    <div class="contenedor-lista">
        <header style="margin-bottom: 30px;">
            <a href="index.html" class="btn-volver">
                <i class="fas fa-arrow-left"></i> Volver al Menú
            </a>
            <h1 style="color: white; margin-top: 20px;">
                <i class="fas fa-shield-halved" style="color: #ffd700;"></i> 
                Panel de Disponibilidad
            </h1>
            <p class="subtitulo" style="color: #ffd700;">Personal de seguridad listo para asignación</p>
        </header>

        <div id="gridAgentes" class="grid-agentes"></div>

        <div id="cargandoAgentes" style="text-align: center; color: white; padding: 50px;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 10px;">Cargando agentes activos...</p>
        </div>
    </div>

    <div id="modalContrato" class="modal-protecbol">
        <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
            <h2 style="margin-bottom: 5px;"><i class="fas fa-file-contract"></i> Contratar Servicio</h2>
            <p id="infoAgenteModal" style="color: #64748b; margin-bottom: 20px;"></p>
            
            <form id="formContrato">
                <input type="hidden" id="modal_agente_id">
                <input type="hidden" id="modal_agente_nombre">
                
                <label><i class="fas fa-map-marker-alt"></i> Ubicación del Servicio:</label>
                <input type="text" id="ubicacion" placeholder="Ej. Zona Norte, Av. América" required>

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label><i class="fas fa-phone"></i> Celular:</label>
                        <input type="tel" id="celular" placeholder="78945612" required>
                    </div>
                    <div style="flex: 1;">
                        <label><i class="fas fa-clock"></i> Inicia a las:</label>
                        <input type="time" id="horario" required>
                    </div>
                </div>

                <label><i class="fas fa-hourglass-half"></i> Horas de Servicio:</label>
                <input type="number" id="horas" min="1" max="24" value="1" oninput="calcularPrecio(this.value)">

                <div class="cuadro-precio">
                    <span>Total estimado:</span>
                    <strong id="precioDisplay">12 Bs.</strong>
                </div>

                <label><i class="fas fa-credit-card"></i> Método de Pago:</label>
                <select id="metodoPago">
                    <option value="Efectivo">Efectivo</option>
                    <option value="QR / Transferencia">QR / Transferencia</option>
                    <option value="Tarjeta">Tarjeta Débito/Crédito</option>
                </select>

                <button type="submit" class="btn-principal" style="margin-top: 20px;">CONFIRMAR CONTRATO</button>
            </form>
        </div>
    </div>

    <script>
        (async () => {
            const url = 'https://ydziovjsqimzyhgpvzwo.supabase.co';
            const key = 'sb_publishable_evZRp02eu_NZB-JKD4xZFA_ecOYHMz3';
            const s = supabase.createClient(url, key);
            const { data: { session } } = await s.auth.getSession();
            if (!session) { window.location.href = 'login.html'; }
            else { 
                document.body.style.visibility = 'visible'; 
                document.body.style.opacity = '1'; 
            }
        })();
    </script>
    
    <script src="js/agentes.js"></script>
</body>
</html>
