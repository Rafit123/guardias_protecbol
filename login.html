<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Pro - Login</title>
    <link rel="stylesheet" href="estilos_nuevos/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="contenedor">
        <header style="text-align: center; margin-bottom: 20px;">
            <i class="fas fa-lock" style="font-size: 2.5rem; color: #0f172a;"></i>
            <h1>ACCESO PRIVADO</h1>
            <p class="subtitulo">Inicie sesión para continuar</p>
        </header>

        <form id="loginForm">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="********" required>

            <button type="submit" class="btn-principal" style="margin-top: 20px;">
                <i class="fas fa-sign-in-alt"></i> INGRESAR
            </button>
            
            <button type="button" id="btnRegistro" class="btn-secundario" style="margin-top: 10px; background: #64748b;">
                <i class="fas fa-user-plus"></i> ¿No tienes cuenta? Regístrate
            </button>
        </form>

        <div id="mensajeLogin" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
